<!-- =============================================
     PRODUCT SECTION — paste below existing sections
     ============================================= -->

<section class="products-section" id="products">
  <div class="container">
    <h2 class="section-title">Our Collection</h2>
    <div class="products-grid">

      {% for dress in dresses %}
      <div class="product-card">
        <div class="product-image-wrapper">
          <img src="{{ dress.image.url }}" alt="{{ dress.name }}" class="product-image" loading="lazy">
        </div>
        <div class="product-info">
          <h3 class="product-name">{{ dress.name }}</h3>
          <a
            href="https://wa.me/91XXXXXXXXXX?text=I%20am%20interested%20in%20{{ dress.name|urlencode }}"
            target="_blank"
            rel="noopener noreferrer"
            class="enquiry-btn"
          >
            Enquiry
          </a>
        </div>
      </div>
      {% empty %}
      <p class="no-products">No products available at the moment.</p>
      {% endfor %}

    </div>
  </div>
</section>

<!-- =============================================
     END PRODUCT SECTION
     ============================================= -->
